<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICU野球分析 完全版</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<div id="app" class="container py-4">
  <h2 class="mb-4">ICU野球分析（完全版）</h2>

  <!-- 管理者ログイン -->
  <div class="card p-3 mb-4">
    <h5>管理者ログイン</h5>
    <div class="row g-2">
      <div class="col-md-5">
        <input v-model="loginForm.email" class="form-control" placeholder="Email" />
      </div>
      <div class="col-md-5">
        <input v-model="loginForm.password" type="password" class="form-control" placeholder="Password" />
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100" @click="loginAdmin">ログイン</button>
      </div>
    </div>
    <div class="mt-2 text-success">全ユーザーが編集可能</div>
  </div>

  <!-- 選手追加 -->
  <div class="card p-3 mb-4">
    <h5>選手追加</h5>
    <div class="row g-2">
      <div class="col-md-4">
        <input v-model="newPlayer.nameFamily" class="form-control" placeholder="姓" />
      </div>
      <div class="col-md-4">
        <input v-model="newPlayer.nameGiven" class="form-control" placeholder="名" />
      </div>
      <div class="col-md-2">
        <input v-model.number="newPlayer.number" type="number" class="form-control" placeholder="背番号" />
      </div>
      <div class="col-md-2">
        <select v-model="newPlayer.pitchHand" class="form-select">
          <option value="R">右投</option>
          <option value="L">左投</option>
          <option value="B">両投</option>
        </select>
      </div>

      <div class="col-md-6">
        <textarea v-model="newPlayer.memo" class="form-control" rows="3" placeholder="メモ"></textarea>
      </div>

      <div class="col-md-6">
        <input type="file" accept="video/*" class="form-control" @change="onVideoSelected" />
      </div>

      <div class="col-12 text-end">
        <button class="btn btn-success" @click="addPlayer">保存</button>
      </div>
    </div>
  </div>

  <!-- 選手一覧 -->
  <div class="card p-3 mb-4">
    <h5>選手一覧</h5>
    <ul class="list-group">
      <li class="list-group-item d-flex justify-content-between align-items-center"
          v-for="p in players"
          :key="p.id">
        <div>
          <strong>{{ p.nameFamily }} {{ p.nameGiven }}</strong>
          (#{{ p.number }})
          <div class="small text-muted">{{ p.memo }}</div>
        </div>
        <div>
          <button class="btn btn-sm btn-danger" @click="deletePlayer(p)">削除</button>
        </div>
      </li>
    </ul>
  </div>

  <!-- 試合結果 -->
  <div class="card p-3 mb-4">
    <h5>試合結果登録</h5>
    <div class="row g-2">
      <div class="col-md-4">
        <input type="date" v-model="newMatch.date" class="form-control" />
      </div>
      <div class="col-md-4">
        <input type="file" accept="image/*" class="form-control" @change="onScoreImageSelected" />
      </div>
      <div class="col-md-4">
        <button class="btn btn-primary w-100" @click="addMatch">保存</button>
      </div>
    </div>
  </div>

  <!-- バックアップ -->
  <div class="text-end mb-5">
    <button class="btn btn-outline-dark" @click="backupAllData">バックアップJSON出力</button>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

const { createApp } = Vue;

createApp({
  data() {
    return {
      players: [],
      matches: [],
      currentUser: null,
      isAdmin: true,
      loginForm: {
        email: "",
        password: ""
      },
      newPlayer: {
        nameFamily: "",
        nameGiven: "",
        number: null,
        pitchHand: "R",
        memo: "",
        videoFile: null,
        videoUrl: ""
      },
      newMatch: {
        date: "",
        imageFile: null,
        imageUrl: ""
      }
    };
  },

  async mounted() {
    onAuthStateChanged(auth, async (user) => {
      this.currentUser = user;
      this.isAdmin = !!user;
      await this.loadPlayers();
      await this.loadMatches();
    });
  },

  methods: {
    async loginAdmin() {
      try {
        await signInWithEmailAndPassword(
          auth,
          this.loginForm.email,
          this.loginForm.password
        );
        alert("ログイン成功");
      } catch (e) {
        alert("ログイン失敗");
      }
    },

    onVideoSelected(e) {
      this.newPlayer.videoFile = e.target.files[0];
    },

    onScoreImageSelected(e) {
      this.newMatch.imageFile = e.target.files[0];
    },

    async uploadFile(file, folder) {
      if (!file) return "";
      const fileRef = ref(storage, `${folder}/${Date.now()}_${file.name}`);
      await uploadBytes(fileRef, file);
      return await getDownloadURL(fileRef);
    },

    async addPlayer() {
      

      const p = JSON.parse(JSON.stringify(this.newPlayer));
      p.videoUrl = await this.uploadFile(this.newPlayer.videoFile, "videos");

      await addDoc(collection(db, "players"), p);
      await this.loadPlayers();

      this.newPlayer = {
        nameFamily: "",
        nameGiven: "",
        number: null,
        pitchHand: "R",
        memo: "",
        videoFile: null,
        videoUrl: ""
      };
    },

    async loadPlayers() {
      const snapshot = await getDocs(collection(db, "players"));
      this.players = snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
      }));
    },

    async deletePlayer(player) {
      

      await deleteDoc(doc(db, "players", player.id));
      await this.loadPlayers();
    },

    async addMatch() {
      

      const imageUrl = await this.uploadFile(this.newMatch.imageFile, "matches");

      await addDoc(collection(db, "matches"), {
        date: this.newMatch.date,
        imageUrl
      });

      await this.loadMatches();
    },

    async loadMatches() {
      const snapshot = await getDocs(collection(db, "matches"));
      this.matches = snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
      }));
    },

    backupAllData() {
      const backup = {
        players: this.players,
        matches: this.matches,
        exportedAt: new Date().toISOString()
      };

      const blob = new Blob(
        [JSON.stringify(backup, null, 2)],
        { type: "application/json" }
      );

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "icu-baseball-backup.json";
      a.click();
    }
  }
}).mount("#app");
</script>
</body>
</html>
